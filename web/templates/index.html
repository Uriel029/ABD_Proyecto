<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>db_engine v1.0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #cdd6f4;
    font-family: 'Consolas', 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #terminal {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
  }

  #terminal .prompt { color: #00d4ff; font-weight: bold; }
  #terminal .exito   { color: #00ff88; }
  #terminal .error   { color: #ff4757; }
  #terminal .aviso   { color: #ffa502; }
  #terminal .encabezado { color: #00d4ff; font-weight: bold; }
  #terminal .borde   { color: #313244; }

  #input-line {
    display: flex;
    align-items: center;
    padding: 8px 20px 16px;
    background: #0a0a1a;
    border-top: 1px solid #1a1a3e;
  }

  #input-line .prompt-char {
    color: #00d4ff;
    font-size: 14px;
    margin-right: 8px;
    flex-shrink: 0;
  }

  #input-line input {
    flex: 1;
    background: transparent;
    border: none;
    color: #ffffff;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 14px;
    outline: none;
    caret-color: #00d4ff;
  }

  #input-line input::placeholder {
    color: #45475a;
  }

  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid #313244;
    border-top-color: #00d4ff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-left: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    #terminal { padding: 12px; font-size: 13px; }
    #input-line { padding: 8px 12px 12px; }
  }
</style>
</head>
<body>
<div id="terminal"></div>

<div id="input-line">
  <span class="prompt-char" id="prompt-char">=#</span>
  <input type="text" id="cmd-input" placeholder="Escribe un comando..." autofocus spellcheck="false" autocomplete="off">
</div>

<script>
const terminal = document.getElementById('terminal');
const input = document.getElementById('cmd-input');
const promptChar = document.getElementById('prompt-char');
let dbActual = null;

function appendHTML(html) {
  terminal.insertAdjacentHTML('beforeend', html);
  terminal.scrollTop = terminal.scrollHeight;
}

function appendLine(text, cls) {
  appendHTML(`<span class="${cls}">${text}</span>\n`);
}

input.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  const cmd = input.value.trim();
  if (!cmd) return;
  input.value = '';
  input.disabled = true;

  // Mostrar comando localmente
  const prompt = dbActual ? `${dbActual}=#` : '=#';
  appendHTML(`<span class="prompt">${prompt} ${cmd}</span>\n`);

  // Spinner
  const spinnerId = 'spinner-' + Date.now();
  appendHTML(`<span id="${spinnerId}"><span class="spinner"></span></span>\n`);
  terminal.scrollTop = terminal.scrollHeight;

  try {
    const res = await fetch('/api/ejecutar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ comando: cmd })
    });
    const data = await res.json();

    // Quitar spinner
    const sp = document.getElementById(spinnerId);
    if (sp) sp.remove();

    if (data.error) {
      appendLine(data.error, 'error');
    }
    if (data.salida) {
      appendHTML(data.salida);
      // Detectar cambios de BD desde la respuesta
      if (cmd.toUpperCase().startsWith('USAR ')) {
        dbActual = cmd.substring(5).trim();
        promptChar.textContent = dbActual ? dbActual + '=#' : '=#';
      } else if (['SALIR BASE', 'SALIR BD'].includes(cmd.toUpperCase())) {
        dbActual = null;
        promptChar.textContent = '=#';
      } else if (cmd.toUpperCase().startsWith('ELIMINAR BASE ')) {
        const nombre = cmd.substring(14).trim();
        if (nombre === dbActual) {
          dbActual = null;
          promptChar.textContent = '=#';
        }
      }
    }
  } catch (err) {
    const sp = document.getElementById(spinnerId);
    if (sp) sp.remove();
    appendLine('Error de conexion: ' + err.message, 'error');
  }

  input.disabled = false;
  input.focus();
});

// Bienvenida
(function() {
  appendHTML(
    '<span class="encabezado">db_engine v1.0</span>\n' +
    '<span class="encabezado">Motor de base de datos en C</span>\n' +
    '<span class="aviso">Escribe AYUDA para ver los comandos</span>\n' +
    '<span class="aviso">Escribe SALIR para terminar</span>\n\n'
  );
  input.focus();
})();
</script>
</body>
</html>
